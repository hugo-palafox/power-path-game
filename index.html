<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Power Path</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="svg-fix.css">
</head>
<body>
<div id="root" class="app">
  <header class="top">
    <button class="hud iconBtn" id="backBtn" aria-label="Back">‹</button>
    <div class="hud timer"><span class="timerIcon">⏱</span><span id="timeText">00:00</span></div>
    <div class="hud levelBox"><div class="levelTitle" id="levelTitle">LEVEL</div><div class="stars" id="stars"></div></div>
    <div class="hud scoreBox">SCORE<b id="scoreText">0</b></div>
    <button class="hud iconBtn reset" id="resetBtn" aria-label="Reset">↻<span>RESET</span></button>
  </header>
  <section class="coach">
    <div class="robot"><div class="antenna"></div><div class="earL"></div><div class="earR"></div><div class="head"><div class="face"></div></div><div class="body"></div><div class="hand">☝</div></div>
    <div class="instruction" id="instruction">MAKE GOAL <span class="go">ON</span></div>
  </section>
  <main class="board" id="board">
    <svg class="canvas" id="svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="nextOverlay" id="nextOverlay"><div class="nextCard"><h2>WIN</h2><div id="winStars"></div><button id="nextBtn">NEXT</button></div></div>
  </main>
  <section class="tray" id="tray"></section>
  <div class="hint"><span class="bulb">💡</span><span>DRAG INTO</span><span class="q">?</span></div>
</div>
<script src="app.js"></script>
<script src="wire-fix.js"></script>
</body>
</html>
