<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Power Path</title>
<style>
:root{--bg:#081226;--panel:#142746;--panel2:#203b63;--line:#3b4a63;--on:#5ff4ff;--win:#8cff71;--bad:#ff6d7a;--text:#f7fbff;--muted:#9db4d3;--gold:#ffd866}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#1d4f86,#081226 55%,#050812);color:var(--text)}button{font:inherit}.app{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:10px;padding:12px;max-width:950px;margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.pill{border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);padding:8px 12px;font-weight:900}.title{font-size:clamp(30px,7vw,58px);font-weight:1000;text-align:center;line-height:1;text-shadow:0 0 22px rgba(95,244,255,.28)}.board{position:relative;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.14);box-shadow:0 25px 60px rgba(0,0,0,.35);overflow:hidden}.board:before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1.4px);background-size:72px 72px;opacity:.12}.wire{position:absolute;height:14px;background:var(--line);border-radius:999px;transform-origin:left center;box-shadow:0 0 3px rgba(0,0,0,.5)}.wire.on{background:var(--on);box-shadow:0 0 18px var(--on);animation:pulse .8s alternate infinite}@keyframes pulse{from{opacity:.72}to{opacity:1}}.thing{position:absolute;transform:translate(-50%,-50%);display:grid;place-items:center;text-align:center;z-index:2}.input{width:92px;height:92px;border:0;border-radius:50%;font-weight:1000;font-size:24px;color:var(--text);background:radial-gradient(circle at 35% 25%,#546480,#172943);box-shadow:0 13px 25px rgba(0,0,0,.35),inset 0 -8px 14px rgba(0,0,0,.25);cursor:pointer}.input small{display:block;font-size:13px;margin-top:2px}.input.on{color:#06222d;background:radial-gradient(circle at 35% 25%,#f7ffff,#32e7fb 45%,#1985bd);box-shadow:0 0 22px var(--on)}.gate,.slot{width:120px;height:82px;border-radius:24px;display:grid;place-items:center;font-size:28px;font-weight:1000;background:linear-gradient(180deg,#28517d,#152844);border:3px solid rgba(255,255,255,.18);box-shadow:0 13px 28px rgba(0,0,0,.35)}.gate.on{border-color:var(--on);box-shadow:0 0 18px var(--on),0 13px 28px rgba(0,0,0,.35)}.slot{border-style:dashed;color:var(--gold);font-size:38px;background:rgba(255,255,255,.06)}.slot.fill{font-size:28px;color:var(--text);border-style:solid;background:linear-gradient(180deg,#315f98,#1d3354)}.goal{width:136px;height:136px;border-radius:34px;background:radial-gradient(circle at 50% 25%,#4f6084,#14223b 65%);border:3px solid rgba(255,255,255,.18);font-size:54px;box-shadow:0 15px 35px rgba(0,0,0,.38)}.goal .word{font-size:20px;font-weight:1000}.goal.on{color:#06250f;background:radial-gradient(circle at 50% 25%,#fffacc,#8cff71 43%,#16964a 74%);box-shadow:0 0 26px var(--win);animation:jump .45s alternate infinite}@keyframes jump{to{transform:translate(-50%,-56%) scale(1.04)}}.bottom{min-height:108px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}.choice,.next,.reset{border:0;border-radius:24px;padding:16px 24px;font-size:26px;font-weight:1000;color:var(--text);background:linear-gradient(180deg,#315f98,#1d3354);box-shadow:0 13px 26px rgba(0,0,0,.34);cursor:pointer}.choice{width:145px;height:82px}.choice.used{opacity:.25;pointer-events:none}.next{background:linear-gradient(180deg,#31aa63,#15753e);display:none}.reset{font-size:16px;padding:10px 13px;background:rgba(255,255,255,.12)}.msg{position:absolute;left:50%;top:12px;transform:translateX(-50%);font-size:clamp(24px,6vw,50px);font-weight:1000;z-index:3;text-align:center;text-shadow:0 5px 20px rgba(0,0,0,.45)}.toast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-weight:1000;font-size:24px;opacity:0;transition:.18s;z-index:4}.toast.show{opacity:1}.shake{animation:shake .22s}@keyframes shake{25%{transform:translate(-53%,-50%)}75%{transform:translate(-47%,-50%)}}@media(max-width:650px){.app{padding:9px}.pill{font-size:14px;padding:7px 9px}.input{width:78px;height:78px;font-size:20px}.gate,.slot{width:100px;height:70px;font-size:23px}.slot{font-size:33px}.goal{width:112px;height:112px;font-size:44px}.choice{width:128px;height:72px;font-size:23px}.bottom{min-height:94px}.title{font-size:34px}}
</style>
</head>
<body>
<div class="app">
 <div class="top"><button class="reset" id="reset">RESET</button><div class="title" id="title">POWER</div><div class="pill" id="level">1/1</div></div>
 <main class="board" id="board"><div class="msg" id="msg">TAP</div><div class="toast" id="toast">TRY</div></main>
 <div class="bottom" id="bottom"></div>
</div>
<script>
const gates={AND:(a,b)=>a&&b,OR:(a,b)=>a||b,XOR:(a,b)=>!!a!==!!b,NOR:(a,b)=>!(a||b),NAND:(a,b)=>!(a&&b)};
const levels=[
 {name:'TAP',mode:'tap1',gate1:'AND',inputs:{A:0,B:0},goal:1,msg:'TAP'},
 {name:'TAP',mode:'tap1',gate1:'OR',inputs:{A:0,B:0},goal:1,msg:'ON'},
 {name:'TRY',mode:'tap1',gate1:'AND',inputs:{A:1,B:0},goal:1,msg:'B ON'},
 {name:'ONE',mode:'tap1',gate1:'XOR',inputs:{A:0,B:0},goal:1,msg:'ONE'},
 {name:'DRAG',mode:'gate2',gate1:'AND',inputs:{A:1,B:1,C:0},choices:['AND','OR'],answer:'OR',goal:1,msg:'PICK'},
 {name:'GO',mode:'gate2',gate1:'OR',inputs:{A:1,B:0,C:1},choices:['AND','XOR'],answer:'AND',goal:1,msg:'PICK'},
 {name:'FIX',mode:'mix',gate1:'AND',inputs:{A:1,B:0,C:1},choices:['AND','OR'],answer:'AND',goal:1,msg:'FIX'},
 {name:'SLEEP',mode:'mix',gate1:'OR',inputs:{A:0,B:0,C:0},choices:['NOR','AND'],answer:'NOR',goal:1,msg:'SLEEP'},
 {name:'HARD',mode:'mix',gate1:'XOR',inputs:{A:1,B:1,C:1},choices:['OR','AND'],answer:'OR',goal:1,msg:'TRY'},
 {name:'WIN',mode:'mix',gate1:'AND',inputs:{A:1,B:1,C:1},choices:['XOR','AND'],answer:'AND',goal:1,msg:'WIN'}
];
let idx=Number(localStorage.powerPathLevel||0);if(idx>=levels.length)idx=0;let state,chosen=null,win=false;
const board=document.getElementById('board'),bottom=document.getElementById('bottom'),msg=document.getElementById('msg'),title=document.getElementById('title'),level=document.getElementById('level'),toast=document.getElementById('toast');
document.getElementById('reset').onclick=()=>{idx=0;localStorage.powerPathLevel=0;load()};
function val(id){return !!state.inputs[id]}function calc1(){return gates[state.gate1](val('A'),val('B'))}function calc2(){if(state.mode==='tap1')return calc1();if(!chosen)return false;return gates[chosen](calc1(),val('C'))}
function pos(){return innerWidth<650?{A:[16,36],B:[16,70],G1:[42,53],C:[42,82],S:[66,53],O:[88,53]}:{A:[13,32],B:[13,73],G1:[38,53],C:[40,82],S:[63,53],O:[86,53]}}
function px(p){return [p[0]*board.clientWidth/100,p[1]*board.clientHeight/100]}function line(a,b,on){let [x1,y1]=px(a),[x2,y2]=px(b),dx=x2-x1,dy=y2-y1;let e=document.createElement('div');e.className='wire '+(on?'on':'');e.style.left=x1+'px';e.style.top=(y1-7)+'px';e.style.width=Math.hypot(dx,dy)+'px';e.style.transform='rotate('+Math.atan2(dy,dx)+'rad)';board.appendChild(e)}
function thing(cls,text,p,fn){let e=document.createElement(fn?'button':'div');e.className='thing '+cls;e.style.left=p[0]+'%';e.style.top=p[1]+'%';e.innerHTML=text;if(fn)e.onclick=fn;board.appendChild(e);return e}
function load(){state=JSON.parse(JSON.stringify(levels[idx]));chosen=null;win=false;render()}
function render(){board.querySelectorAll('.thing,.wire').forEach(e=>e.remove());bottom.innerHTML='';title.textContent=state.name;level.textContent=(idx+1)+'/'+levels.length;msg.textContent=win?'WIN':state.msg;let p=pos(),o1=calc1(),o2=calc2();win=o2===!!state.goal;if(win)msg.textContent='WIN';line(p.A,p.G1,val('A'));line(p.B,p.G1,val('B'));if(state.mode==='tap1'){line(p.G1,p.O,o1)}else{line(p.G1,p.S,o1);line(p.C,p.S,val('C'));line(p.S,p.O,o2)}thing('input '+(val('A')?'on':''),'A<small>'+(val('A')?'ON':'OFF')+'</small>',p.A,()=>flip('A'));thing('input '+(val('B')?'on':''),'B<small>'+(val('B')?'ON':'OFF')+'</small>',p.B,()=>flip('B'));thing('gate '+(o1?'on':''),state.gate1,p.G1);if(state.mode!=='tap1'){thing('input '+(val('C')?'on':''),'C<small>'+(val('C')?'ON':'OFF')+'</small>',p.C,()=>flip('C'));thing((chosen?'slot fill '+(o2?'on':''):'slot'),chosen||'?',p.S,()=>{});state.choices.forEach(c=>choice(c))}thing('goal '+(win?'on':''),'<div>◆</div><div class="word">GO</div>',p.O);if(win){let n=document.createElement('button');n.className='next';n.style.display='block';n.textContent=idx===levels.length-1?'AGAIN':'NEXT';n.onclick=()=>{idx=(idx+1)%levels.length;localStorage.powerPathLevel=idx;load()};bottom.appendChild(n)}else if(state.mode==='tap1'){let h=document.createElement('div');h.className='pill';h.textContent='TAP A B';bottom.appendChild(h)}}
function flip(k){state.inputs[k]=state.inputs[k]?0:1;render()}
function choice(c){let b=document.createElement('button');b.className='choice '+(chosen===c?'used':'');b.textContent=c;b.draggable=true;b.onclick=()=>pick(c);b.ondragstart=e=>e.dataTransfer.setData('text/plain',c);bottom.appendChild(b)}
board.ondragover=e=>e.preventDefault();board.ondrop=e=>{let c=e.dataTransfer.getData('text/plain');if(c)pick(c)};
function pick(c){chosen=c;let ok=calc2()===!!state.goal;if(!ok){toast.textContent='TRY';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),450)}render()}
addEventListener('resize',render);load();
</script>
</body>
</html>
